{% extends "base.html" %}
{% block title %}Login - Glasgow Car Hire{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card">
      <div class="card-header text-center">
        <h2 class="mb-0">Welcome Back</h2>
        <p class="text-muted mt-2 mb-0">Sign in to your account</p>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% if next %}
            <input type="hidden" name="next" value="{{ next }}" />
          {% endif %}
          <div class="mb-3">
            <label for="{{ form.username.id_for_label }}" class="form-label fw-semibold">Username</label>
            {{ form.username }}
          </div>
          <div class="mb-4">
            <label for="{{ form.password.id_for_label }}" class="form-label fw-semibold">Password</label>
            {{ form.password }}
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
          </button>
        </form>
        
        <div class="text-center mt-4">
          <p class="text-muted mb-2">Don't have an account?</p>
          <a href="/accounts/register/" class="btn btn-outline-primary">
            Create Account
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
