{% extends "base.html" %}
{% block title %}Delete Post - Community{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header text-center">
        <h2 class="mb-0">Delete Post</h2>
      </div>
      <div class="card-body text-center">
        <div class="alert alert-warning mb-4">
          <i class="fas fa-exclamation-triangle fa-2x text-warning mb-3"></i>
          <h5>Are you sure?</h5>
          <p class="mb-0">You are about to delete "<strong>{{ post.title }}</strong>". This action cannot be undone.</p>
        </div>
        
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-3 justify-content-center">
            <button class="btn btn-danger btn-lg" type="submit">
              <i class="fas fa-trash me-2"></i>Delete Post
            </button>
            <a class="btn btn-outline-secondary btn-lg" href="/community/post/{{ post.id }}/">
              <i class="fas fa-arrow-left me-2"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
