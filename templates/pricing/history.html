{% extends "base.html" %}
{% block content %}
<h2>我的比价历史</h2>
<ul>
  {% for s in searches %}
    <li>
      <a href="/pricing/results/{{ s.id }}/">Search #{{ s.id }}</a>
      | {{ s.pickup_entity_id }} | {{ s.pickup_datetime }} → {{ s.dropoff_datetime }}
    </li>
  {% empty %}
    <li>暂无历史</li>
  {% endfor %}
</ul>
{% endblock %}
