<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Glasgow Car Hire{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-light border-bottom">
  <div class="container">
    <a class="navbar-brand" href="/">Glasgow Car Hire</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/pricing/search/">Compare</a>
      <a class="nav-link" href="/community/">Community</a>

      {% if user.is_authenticated %}
        <a class="nav-link" href="/pricing/history/">History</a>
        <a class="nav-link" href="/pricing/favorites/">Favorites</a>
        <a class="nav-link" href="/accounts/logout/">Logout</a>
      {% else %}
        <a class="nav-link" href="/accounts/login/">Login</a>
        <a class="nav-link" href="/accounts/register/">Register</a>
      {% endif %}
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>
</body>
</html>
