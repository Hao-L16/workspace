{% extends "base.html" %}
{% block content %}
<h2>{{ post.title }}</h2>
{% if post.image %}
  <img src="{{ post.image.url }}" alt="Post Image" class="img-fluid mb-3">
{% endif %}
<p>分类：{{ post.category }} | 作者：{{ post.author.username }} | 时间：{{ post.created_at }}</p>
<hr>
<p style="white-space:pre-wrap;">{{ post.content }}</p>
{% endblock %}
